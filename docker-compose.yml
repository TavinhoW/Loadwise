version: "3"

services:
  service-a:
    build: ./service-a
    container_name: service_a

  service-b:
    build: ./service-b
    container_name: service_b

  nginx:
    image: nginx
    container_name: load_balancer
    ports:
      -  "8080:80"
    volumes:
      -  ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      -  service-a
      -  service-b

