upstream backend {
    # Estratégia: Round Robin (padrão) — distribui por ordem sequencial
    server service-a:3000 max_fails=1 fail_timeout=15s;
    server service-b:3000 max_fails=1 fail_timeout=15s;
    # Nota: o nginx corre na mesma rede Docker "loadwise" para resolver os nomes dos containers

    # Alternativa: Least Connections — roteia para o servidor com menos ligações ativas
    # least_conn;

    # Alternativa: IP Hash — o mesmo cliente vai sempre ao mesmo servidor (sessão persistente)
    # ip_hash;
}

server {
    listen 80;

    # Compressão gzip para respostas JSON
    gzip on;
    gzip_types application/json text/plain;
    gzip_min_length 256;

    location / {
        # CORS
        add_header 'Access-Control-Allow-Origin' 'http://localhost:3000' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Content-Type' always;

        if ($request_method = OPTIONS) {
            return 204;
        }

        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # Timeouts
        proxy_connect_timeout 500ms;
        proxy_read_timeout 30s;
        proxy_send_timeout 10s;
    }

    # Resposta de erro quando os serviços estão indisponíveis
    error_page 502 503 504 @service_unavailable;
    location @service_unavailable {
        default_type application/json;
        return 503 '{"error":"Service temporarily unavailable","status":503}';
    }
}
