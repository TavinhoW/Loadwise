name: CI

on:
  push:
    branches: [ main, gm-melhorias ]
  pull_request:
    branches: [ main ]

jobs:
  test-frontend:
    name: Frontend Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/loadwise-dashboard/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend/loadwise-dashboard

      - name: Run tests
        run: npm test -- --watchAll=false --ci
        working-directory: frontend/loadwise-dashboard
        env:
          CI: true

  lint-backend:
    name: Backend Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install ESLint (service-a)
        run: npm install
        working-directory: service-a

      - name: Lint service-a
        run: npm run lint
        working-directory: service-a

      - name: Install ESLint (service-b)
        run: npm install
        working-directory: service-b

      - name: Lint service-b
        run: npm run lint
        working-directory: service-b

  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build all services
        run: docker compose build
