server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Cache longo para assets estáticos (JS, CSS, imagens com hash)
    location /static/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Fallback SPA — todas as rotas servem o index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
